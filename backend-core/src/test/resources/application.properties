spring.application.name=OmniBot Platform - Test

# In-memory H2 for tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# Disable mail
spring.mail.host=localhost

# Vendor config
omnibot.vendor.mode=mock
omnibot.vendor.timeout-ms=5000
omnibot.vendor.max-retries=0

omnibot.vendor.zomato.api-key=test-key
omnibot.vendor.zomato.endpoint=http://localhost
omnibot.vendor.swiggy.api-key=test-key
omnibot.vendor.swiggy.endpoint=http://localhost
omnibot.vendor.ubereats.api-key=test-key
omnibot.vendor.ubereats.endpoint=http://localhost
omnibot.vendor.doordash.api-key=test-key
omnibot.vendor.doordash.endpoint=http://localhost
omnibot.vendor.uber.api-key=test-key
omnibot.vendor.uber.endpoint=http://localhost
omnibot.vendor.ola.api-key=test-key
omnibot.vendor.ola.endpoint=http://localhost
omnibot.vendor.lyft.api-key=test-key
omnibot.vendor.lyft.endpoint=http://localhost
omnibot.vendor.bolt.api-key=test-key
omnibot.vendor.bolt.endpoint=http://localhost
omnibot.vendor.rapido.api-key=test-key
omnibot.vendor.rapido.endpoint=http://localhost
omnibot.vendor.yulu.api-key=test-key
omnibot.vendor.yulu.endpoint=http://localhost
omnibot.vendor.amazon.api-key=test-key
omnibot.vendor.amazon.endpoint=http://localhost
omnibot.vendor.flipkart.api-key=test-key
omnibot.vendor.flipkart.endpoint=http://localhost
omnibot.vendor.meesho.api-key=test-key
omnibot.vendor.meesho.endpoint=http://localhost
omnibot.vendor.myntra.api-key=test-key
omnibot.vendor.myntra.endpoint=http://localhost
omnibot.vendor.ebay.api-key=test-key
omnibot.vendor.ebay.endpoint=http://localhost

# Disable security for tests
omnibot.jwt.secret=test-secret-key-must-be-at-least-256-bits-long-for-hs256-algorithm
omnibot.jwt.access-token-expiry-ms=900000
omnibot.jwt.refresh-token-expiry-ms=604800000

logging.level.com.omnibot=INFO
