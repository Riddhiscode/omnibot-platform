<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBot — Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0c0e14;
            --surface: #13161f;
            --surface2: #1a1e2b;
            --border: rgba(255,255,255,0.08);
            --accent: #6c63ff;
            --accent2: #00d4aa;
            --text: #e8eaf2;
            --muted: #7c8296;
            --error: #ff5f5f;
            --success: #00d4aa;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Sora', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 500px;
        }

        .logo {
            text-align: center;
            margin-bottom: 2rem;
        }

        .logo-mark {
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent2));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: -0.02em;
        }

        .logo-sub {
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 0.25rem;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 2rem;
        }

        .tabs {
            display: flex;
            border-bottom: 1px solid var(--border);
            margin-bottom: 1.75rem;
            gap: 0;
        }

        .tab {
            flex: 1;
            padding: 0.75rem;
            font-size: 0.875rem;
            font-weight: 500;
            color: var(--muted);
            background: none;
            border: none;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            margin-bottom: -1px;
            transition: all 0.2s;
            font-family: 'Sora', sans-serif;
        }

        .tab.active {
            color: var(--text);
            border-bottom-color: var(--accent);
        }

        h2 {
            font-size: 1.25rem;
            margin-bottom: 1.5rem;
            text-align: center;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .stat-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 1rem;
            text-align: center;
        }

        .stat-card h3 {
            color: var(--muted);
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .stat-card .value {
            font-family: 'Space Mono', monospace;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text);
        }

        .btn {
            width: 100%;
            padding: 0.875rem;
            border-radius: 8px;
            font-family: 'Sora', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text);
            margin-bottom: 0.75rem;
            transition: all 0.2s;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .btn:hover {
            border-color: var(--accent);
            background: rgba(108, 99, 255, 0.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #4f46e5);
            color: #fff;
            border: none;
            justify-content: center;
            text-align: center;
            margin-top: 1rem;
        }

        .btn-primary:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="logo">
        <div class="logo-mark">⬡ OmniBot</div>
        <div class="logo-sub">Your universal service gateway</div>
    </div>

    <div class="card">
        <div class="tabs">
            <button class="tab active" onclick="window.location.href='dashboard.html'">Dashboard</button>
            <button class="tab" onclick="window.location.href='history.html'">History</button>
        </div>

        <h2>Welcome, Demo User</h2>

        <div class="stats-grid">
            <div class="stat-card">
                <h3>Total Orders</h3>
                <div class="value">24</div>
            </div>
            <div class="stat-card">
                <h3>Active Apps</h3>
                <div class="value" style="color: var(--accent2);">4</div>
            </div>
        </div>

        <button class="btn"><span>🍕</span> Order Food (Zomato)</button>
        <button class="btn"><span>🚗</span> Book Ride (Uber)</button>
        <button class="btn"><span>🛒</span> Groceries (BigBasket)</button>
        <button class="btn"><span>📦</span> Shopping (Amazon)</button>

        <button class="btn btn-primary" onclick="window.location.href='login.html'">Sign Out</button>
    </div>
</div>

</body>
</html>
