<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniBot — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e14; --surface: #13161f; --surface2: #1a1e2b;
  --border: rgba(255,255,255,0.08); --accent: #6c63ff; --accent2: #00d4aa;
  --text: #e8eaf2; --muted: #7c8296; --error: #ff5f5f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }

/* HEADER */
.header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; }
.logo { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
.user-info { display: flex; align-items: center; gap: 0.75rem; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; }
.logout-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 0.3rem 0.75rem; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-family: 'Sora', sans-serif; }
.logout-btn:hover { color: var(--text); }

/* QUICK ACTIONS */
.quick-actions { display: flex; gap: 0.5rem; padding: 0.75rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; }
.qa-btn { display: flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.875rem; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 0.78rem; cursor: pointer; white-space: nowrap; font-family: 'Sora', sans-serif; transition: border-color 0.2s; }
.qa-btn:hover { border-color: var(--accent); }

/* MAIN LAYOUT */
.main { display: flex; flex: 1; overflow: hidden; }

/* CHAT PANEL */
.chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.messages { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg { display: flex; gap: 0.6rem; max-width: 80%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
.msg.bot .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); }
.msg.user .msg-avatar { background: var(--surface2); border: 1px solid var(--border); }
.msg-bubble { padding: 0.65rem 0.875rem; border-radius: 12px; font-size: 0.85rem; line-height: 1.6; }
.msg.bot .msg-bubble { background: var(--surface2); border: 1px solid var(--border); border-top-left-radius: 2px; }
.msg.user .msg-bubble { background: linear-gradient(135deg, var(--accent), #4f46e5); border-top-right-radius: 2px; }
.msg-time { font-size: 0.65rem; color: var(--muted); margin-top: 0.25rem; }
.msg.user .msg-time { text-align: right; }

/* SERVICE CARDS */
.cards-row { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.5rem; }
.svc-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.65rem 0.875rem; min-width: 130px; cursor: pointer; transition: border-color 0.2s, transform 0.1s; }
.svc-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.svc-card:active { transform: scale(0.98); }
.svc-name { font-size: 0.82rem; font-weight: 600; display: flex; align-items: center; gap: 0.3rem; margin-bottom: 0.3rem; }
.svc-eta { font-size: 0.72rem; color: var(--accent2); }
.svc-price { font-size: 0.78rem; font-weight: 500; margin-top: 0.15rem; }
.svc-rating { font-size: 0.68rem; color: var(--muted); }
.svc-btn { margin-top: 0.4rem; width: 100%; padding: 0.3rem; border-radius: 6px; border: none; background: linear-gradient(135deg, var(--accent), #4f46e5); color: #fff; font-size: 0.7rem; font-weight: 600; cursor: pointer; font-family: 'Sora', sans-serif; }

/* TYPING INDICATOR */
.typing { display: none; align-items: center; gap: 0.6rem; padding: 0 1.25rem; }
.typing.show { display: flex; }
.typing-dots { display: flex; gap: 3px; }
.typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

/* INPUT */
.input-area { padding: 0.875rem 1.25rem; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 0.6rem; align-items: flex-end; }
.input-wrap { flex: 1; position: relative; }
textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Sora', sans-serif; font-size: 0.875rem; padding: 0.65rem 0.875rem; resize: none; outline: none; max-height: 120px; min-height: 42px; transition: border-color 0.2s; line-height: 1.5; }
textarea:focus { border-color: var(--accent); }
.send-btn { width: 42px; height: 42px; border-radius: 10px; border: none; background: linear-gradient(135deg, var(--accent), #4f46e5); color: #fff; font-size: 1.1rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* SIDEBAR */
.sidebar { width: 220px; background: var(--surface); border-left: 1px solid var(--border); padding: 1rem; overflow-y: auto; flex-shrink: 0; }
.sidebar-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.75rem; }
.service-list { display: flex; flex-direction: column; gap: 0.4rem; }
.service-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.6rem; border-radius: 8px; border: 1px solid var(--border); font-size: 0.78rem; cursor: pointer; transition: border-color 0.2s; }
.service-item:hover { border-color: var(--accent); }
.service-item .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); }
.section-gap { margin-top: 1.25rem; }

/* WELCOME */
.welcome { text-align: center; padding: 2rem 1rem; color: var(--muted); }
.welcome-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
.welcome h3 { font-size: 1rem; color: var(--text); margin-bottom: 0.5rem; }
.welcome p { font-size: 0.8rem; line-height: 1.6; }
</style>
</head>
<body>

<div class="header">
  <div class="logo">⬡ OmniBot</div>
  <div class="user-info">
    <div class="avatar" id="avatarInitial">R</div>
    <span style="font-size:0.82rem" id="userName">User</span>
    <button class="logout-btn" onclick="logout()">Sign out</button>
  </div>
</div>

<div class="quick-actions">
  <button class="qa-btn" onclick="quickSend('Order food near me')">🍕 Order Food</button>
  <button class="qa-btn" onclick="quickSend('Book a cab for me')">🚗 Book Cab</button>
  <button class="qa-btn" onclick="quickSend('Book a bike ride')">🏍️ Bike Ride</button>
  <button class="qa-btn" onclick="quickSend('Buy something on Amazon')">📦 Shop Now</button>
  <button class="qa-btn" onclick="quickSend('Compare prices for me')">⚖️ Compare</button>
  <button class="qa-btn" onclick="quickSend('Track my order')">📍 Track Order</button>
  <button class="qa-btn" onclick="quickSend('Help')">❓ Help</button>
</div>

<div class="main">
  <div class="chat-panel">
    <div class="messages" id="messages">
      <div class="welcome">
        <div class="welcome-icon">🤖</div>
        <h3>Welcome to OmniBot!</h3>
        <p>Your one-stop assistant for food, rides & shopping.<br>Try the quick buttons above or type anything below.</p>
      </div>
    </div>

    <div class="typing" id="typing">
      <div class="msg-avatar" style="background:linear-gradient(135deg,#6c63ff,#00d4aa);width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7rem">⬡</div>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="msgInput" placeholder="Ask OmniBot anything — food, rides, shopping..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>

  <div class="sidebar">
    <div class="sidebar-title">🍕 Food</div>
    <div class="service-list">
      <div class="service-item" onclick="quickSend('Order from Zomato')"><div class="dot"></div>Zomato</div>
      <div class="service-item" onclick="quickSend('Order from Swiggy')"><div class="dot"></div>Swiggy</div>
      <div class="service-item" onclick="quickSend('Order from Blinkit')"><div class="dot"></div>Blinkit</div>
      <div class="service-item" onclick="quickSend('Order from Zepto')"><div class="dot"></div>Zepto</div>
    </div>
    <div class="section-gap">
      <div class="sidebar-title">🚗 Transport</div>
      <div class="service-list">
        <div class="service-item" onclick="quickSend('Book Uber cab')"><div class="dot" style="background:#fff"></div>Uber</div>
        <div class="service-item" onclick="quickSend('Book Ola cab')"><div class="dot" style="background:#ffd700"></div>Ola</div>
        <div class="service-item" onclick="quickSend('Book Rapido bike')"><div class="dot" style="background:#ff6b00"></div>Rapido</div>
        <div class="service-item" onclick="quickSend('Book Yulu cycle')"><div class="dot" style="background:#00d4aa"></div>Yulu</div>
      </div>
    </div>
    <div class="section-gap">
      <div class="sidebar-title">📦 Shopping</div>
      <div class="service-list">
        <div class="service-item" onclick="quickSend('Buy on Amazon')"><div class="dot" style="background:#ff9900"></div>Amazon</div>
        <div class="service-item" onclick="quickSend('Buy on Flipkart')"><div class="dot" style="background:#2874f0"></div>Flipkart</div>
        <div class="service-item" onclick="quickSend('Buy on Meesho')"><div class="dot" style="background:#f43397"></div>Meesho</div>
        <div class="service-item" onclick="quickSend('Buy on Myntra')"><div class="dot" style="background:#ff3f6c"></div>Myntra</div>
      </div>
    </div>
  </div>
</div>

<script>
const API = 'http://localhost:8080/api';
let token = localStorage.getItem('omnibot_token');
let sessionId = null;
let userEmail = '';

// Redirect to login if no token
if (!token) { window.location.href = 'http://localhost:8080/login.html'; }

// Load user info from token
function parseJwt(t) {
  try { return JSON.parse(atob(t.split('.')[1])); } catch(e) { return {}; }
}
const payload = parseJwt(token);
userEmail = payload.sub || 'User';
const initial = userEmail.charAt(0).toUpperCase();
document.getElementById('avatarInitial').textContent = initial;
document.getElementById('userName').textContent = userEmail.split('@')[0];

function logout() {
  localStorage.removeItem('omnibot_token');
  window.location.href = 'http://localhost:8080/login.html';
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function quickSend(text) {
  document.getElementById('msgInput').value = text;
  sendMessage();
}

function formatTime(d) {
  return new Date(d).toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}

function appendMessage(role, content, time, services) {
  const container = document.getElementById('messages');

  // Remove welcome screen on first message
  const welcome = container.querySelector('.welcome');
  if (welcome) welcome.remove();

  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role;

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.textContent = role === 'bot' ? '⬡' : initial;

  const right = document.createElement('div');

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = content.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');

  const timeEl = document.createElement('div');
  timeEl.className = 'msg-time';
  timeEl.textContent = formatTime(time || new Date());

  right.appendChild(bubble);

  // Service cards
  if (services && services.length > 0) {
    const row = document.createElement('div');
    row.className = 'cards-row';
    services.forEach(s => {
      const card = document.createElement('div');
      card.className = 'svc-card';
      card.innerHTML = `
        <div class="svc-name">${s.logo} ${s.name}</div>
        <div class="svc-eta">${s.estimate}</div>
        <div class="svc-price">${s.price}</div>
        <div class="svc-rating">⭐ ${s.rating}</div>
        <button class="svc-btn" onclick="selectService('${s.name}','${s.action}')">Select ${s.name}</button>
      `;
      row.appendChild(card);
    });
    right.appendChild(row);
  }

  right.appendChild(timeEl);
  wrap.appendChild(av);
  wrap.appendChild(right);
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
}

function selectService(name, action) {
  quickSend(`I want to use ${name} for ${action.replace(/_/g,' ').toLowerCase()}`);
}

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const msg = input.value.trim();
  if (!msg) return;

  const btn = document.getElementById('sendBtn');
  input.value = '';
  input.style.height = 'auto';
  btn.disabled = true;

  // Show user message
  appendMessage('user', msg, new Date(), null);

  // Show typing
  document.getElementById('typing').classList.add('show');

  try {
    const res = await fetch(API + '/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ message: msg, sessionId: sessionId })
    });

    if (res.status === 401) { logout(); return; }

    const data = await res.json();
    sessionId = data.sessionId;

    document.getElementById('typing').classList.remove('show');
    appendMessage('bot', data.reply, data.timestamp, data.services);

  } catch (err) {
    document.getElementById('typing').classList.remove('show');
    appendMessage('bot', '⚠️ Unable to reach OmniBot server. Make sure the backend is running on port 8080.', new Date(), null);
  } finally {
    btn.disabled = false;
    input.focus();
  }
}
</script>
</body>
</html>
