spring.application.name=OmniBot Platform

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/omnibot_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=8080
server.servlet.context-path=/api

# JWT
omnibot.jwt.secret=OmniBotSuperSecretKey2024ChangeInProductionMustBe256BitsLongABCDEFGH
omnibot.jwt.access-token-expiry-ms=900000
omnibot.jwt.refresh-token-expiry-ms=604800000

# Mail (dummy for now)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@omnibot.in
spring.mail.password=changeme
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.com.omnibot=DEBUG

# ============================================================
# VENDOR ADAPTER CONFIGURATION
# ============================================================
# Mode: "mock" (simulated data) or "live" (real API calls)
omnibot.vendor.mode=mock
omnibot.vendor.timeout-ms=5000
omnibot.vendor.max-retries=2

# --- Food Vendors ---
omnibot.vendor.zomato.api-key=${ZOMATO_API_KEY:}
omnibot.vendor.zomato.endpoint=${ZOMATO_ENDPOINT:https://www.zomato.com/restapi}
omnibot.vendor.swiggy.api-key=${SWIGGY_API_KEY:}
omnibot.vendor.swiggy.endpoint=${SWIGGY_ENDPOINT:https://www.swiggy.com/restapi}
omnibot.vendor.ubereats.api-key=${UBEREATS_API_KEY:}
omnibot.vendor.ubereats.endpoint=${UBEREATS_ENDPOINT:https://www.ubereats.com/api}
omnibot.vendor.doordash.api-key=${DOORDASH_API_KEY:}
omnibot.vendor.doordash.endpoint=${DOORDASH_ENDPOINT:https://openapi.doordash.com/v1}

# --- Transport Vendors ---
omnibot.vendor.uber.api-key=${UBER_API_KEY:}
omnibot.vendor.uber.api-secret=${UBER_API_SECRET:}
omnibot.vendor.uber.endpoint=${UBER_ENDPOINT:https://api.uber.com/v1}
omnibot.vendor.ola.api-key=${OLA_API_KEY:}
omnibot.vendor.ola.endpoint=${OLA_ENDPOINT:https://api.olacabs.com/v1}
omnibot.vendor.lyft.api-key=${LYFT_API_KEY:}
omnibot.vendor.lyft.endpoint=${LYFT_ENDPOINT:https://api.lyft.com/v1}
omnibot.vendor.bolt.api-key=${BOLT_API_KEY:}
omnibot.vendor.bolt.endpoint=${BOLT_ENDPOINT:https://api.bolt.eu/v1}
omnibot.vendor.rapido.api-key=${RAPIDO_API_KEY:}
omnibot.vendor.rapido.endpoint=${RAPIDO_ENDPOINT:https://api.rapido.bike/v1}
omnibot.vendor.yulu.api-key=${YULU_API_KEY:}
omnibot.vendor.yulu.endpoint=${YULU_ENDPOINT:https://api.yulu.bike/v1}

# --- Shopping Vendors ---
omnibot.vendor.amazon.api-key=${AMAZON_API_KEY:}
omnibot.vendor.amazon.merchant-id=${AMAZON_MERCHANT_ID:}
omnibot.vendor.amazon.endpoint=${AMAZON_ENDPOINT:https://sellingpartnerapi-eu.amazon.com}
omnibot.vendor.flipkart.api-key=${FLIPKART_API_KEY:}
omnibot.vendor.flipkart.merchant-id=${FLIPKART_MERCHANT_ID:}
omnibot.vendor.flipkart.endpoint=${FLIPKART_ENDPOINT:https://api.flipkart.com/v1}
omnibot.vendor.meesho.api-key=${MEESHO_API_KEY:}
omnibot.vendor.meesho.endpoint=${MEESHO_ENDPOINT:https://api.meesho.com/v1}
omnibot.vendor.myntra.api-key=${MYNTRA_API_KEY:}
omnibot.vendor.myntra.endpoint=${MYNTRA_ENDPOINT:https://api.myntra.com/v1}
omnibot.vendor.ebay.api-key=${EBAY_API_KEY:}
