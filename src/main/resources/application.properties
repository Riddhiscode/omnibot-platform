spring.application.name=OmniBot Platform

# Database
spring.datasource.url=jdbc:mysql://localhost:3306/omnibot_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Server
server.port=8080
server.servlet.context-path=/api

# JWT
omnibot.jwt.secret=OmniBotSuperSecretKey2024ChangeInProductionMustBe256BitsLongABCDEFGH
omnibot.jwt.access-token-expiry-ms=900000
omnibot.jwt.refresh-token-expiry-ms=604800000

# Mail (dummy for now)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=noreply@omnibot.in
spring.mail.password=changeme
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Logging
logging.level.com.omnibot=DEBUG
