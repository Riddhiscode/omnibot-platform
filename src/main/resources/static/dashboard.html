<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmniBot — Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600&family=Space+Mono:wght@700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0c0e14; --surface: #13161f; --surface2: #1a1e2b;
  --border: rgba(255,255,255,0.08); --accent: #6c63ff; --accent2: #00d4aa;
  --text: #e8eaf2; --muted: #7c8296; --error: #ff5f5f;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { font-family: 'Sora', sans-serif; background: var(--bg); color: var(--text); display: flex; flex-direction: column; overflow: hidden; }

/* HEADER */
.header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; gap: 0.75rem; }
.logo { font-family: 'Space Mono', monospace; font-size: 1rem; font-weight: 700; background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; white-space: nowrap; }
.user-info { display: flex; align-items: center; gap: 0.6rem; min-width: 0; }
.avatar { width: 32px; height: 32px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), var(--accent2)); display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 600; flex-shrink: 0; color: #0c0e14; }
.user-name { font-size: 0.82rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.hdr-btn { background: none; border: 1px solid var(--border); color: var(--muted); padding: 0.3rem 0.75rem; border-radius: 6px; font-size: 0.75rem; cursor: pointer; font-family: 'Sora', sans-serif; white-space: nowrap; transition: color 0.2s, border-color 0.2s; }
.hdr-btn:hover { color: var(--text); border-color: var(--accent); }
.hdr-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

/* QUICK ACTIONS */
.quick-actions { display: flex; gap: 0.5rem; padding: 0.75rem 1.5rem; background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; overflow-x: auto; scrollbar-width: none; }
.quick-actions::-webkit-scrollbar { display: none; }
.qa-btn { display: flex; align-items: center; gap: 0.4rem; padding: 0.4rem 0.875rem; border-radius: 20px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); font-size: 0.78rem; cursor: pointer; white-space: nowrap; font-family: 'Sora', sans-serif; transition: border-color 0.2s; }
.qa-btn:hover { border-color: var(--accent); }
.qa-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.qa-btn:disabled { opacity: 0.5; cursor: not-allowed; }

/* MAIN LAYOUT */
.main { display: flex; flex: 1; overflow: hidden; }

/* CHAT PANEL */
.chat-panel { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.messages { flex: 1; overflow-y: auto; padding: 1.25rem; display: flex; flex-direction: column; gap: 1rem; }
.messages::-webkit-scrollbar { width: 4px; }
.messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

.msg { display: flex; gap: 0.6rem; max-width: 80%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; }
.msg.bot .msg-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: #0c0e14; }
.msg.user .msg-avatar { background: var(--surface2); border: 1px solid var(--border); }
.msg-bubble { padding: 0.65rem 0.875rem; border-radius: 12px; font-size: 0.85rem; line-height: 1.6; overflow-wrap: break-word; }
.msg.bot .msg-bubble { background: var(--surface2); border: 1px solid var(--border); border-top-left-radius: 2px; }
.msg.bot.error .msg-bubble { border-color: rgba(255,95,95,0.4); color: var(--error); }
.msg.user .msg-bubble { background: linear-gradient(135deg, var(--accent), #4f46e5); border-top-right-radius: 2px; color: #fff; }
.msg-meta { display: flex; align-items: center; gap: 0.5rem; margin-top: 0.25rem; }
.msg.user .msg-meta { justify-content: flex-end; }
.msg-time { font-size: 0.65rem; color: var(--muted); }
.intent-chip { font-size: 0.6rem; color: var(--accent2); border: 1px solid rgba(0,212,170,0.3); border-radius: 10px; padding: 0.05rem 0.45rem; letter-spacing: 0.04em; }
.retry-link { background: none; border: none; color: var(--accent); font-size: 0.7rem; cursor: pointer; font-family: 'Sora', sans-serif; text-decoration: underline; padding: 0; }

/* SERVICE CARDS */
.cards-row { display: flex; gap: 0.6rem; flex-wrap: wrap; margin-top: 0.5rem; }
.svc-card { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 0.65rem 0.875rem; min-width: 130px; transition: border-color 0.2s, transform 0.1s; }
.svc-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.svc-name { font-size: 0.82rem; font-weight: 600; display: flex; align-items: center; gap: 0.3rem; margin-bottom: 0.3rem; }
.svc-eta { font-size: 0.72rem; color: var(--accent2); }
.svc-price { font-size: 0.78rem; font-weight: 500; margin-top: 0.15rem; }
.svc-rating { font-size: 0.68rem; color: var(--muted); }
.svc-btn { margin-top: 0.4rem; width: 100%; padding: 0.3rem; border-radius: 6px; border: none; background: linear-gradient(135deg, var(--accent), #4f46e5); color: #fff; font-size: 0.7rem; font-weight: 600; cursor: pointer; font-family: 'Sora', sans-serif; }
.svc-btn:focus-visible { outline: 2px solid var(--accent2); outline-offset: 2px; }
.svc-btn:active { transform: scale(0.98); }

/* TYPING INDICATOR */
.typing { display: none; align-items: center; gap: 0.6rem; padding: 0 1.25rem 0.5rem; }
.typing.show { display: flex; }
.typing-avatar { background: linear-gradient(135deg, var(--accent), var(--accent2)); width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; color: #0c0e14; }
.typing-dots { display: flex; gap: 3px; }
.typing-dots span { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: bounce 1s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.15s; }
.typing-dots span:nth-child(3) { animation-delay: 0.3s; }
@keyframes bounce { 0%,60%,100% { transform: translateY(0); } 30% { transform: translateY(-6px); } }

/* INPUT */
.input-area { padding: 0.875rem 1.25rem; border-top: 1px solid var(--border); background: var(--surface); display: flex; gap: 0.6rem; align-items: flex-end; flex-shrink: 0; }
.input-wrap { flex: 1; position: relative; }
textarea { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'Sora', sans-serif; font-size: 0.875rem; padding: 0.65rem 0.875rem; resize: none; outline: none; max-height: 120px; min-height: 42px; transition: border-color 0.2s; line-height: 1.5; display: block; }
textarea:focus { border-color: var(--accent); }
.char-hint { position: absolute; right: 0.6rem; bottom: 0.4rem; font-size: 0.62rem; color: var(--muted); pointer-events: none; display: none; }
.char-hint.show { display: block; }
.char-hint.over { color: var(--error); }
.send-btn { width: 42px; height: 42px; border-radius: 10px; border: none; background: linear-gradient(135deg, var(--accent), #4f46e5); color: #fff; font-size: 1.1rem; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: opacity 0.2s; }
.send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.send-btn:focus-visible { outline: 2px solid var(--accent2); outline-offset: 2px; }

/* SIDEBAR */
.sidebar { width: 220px; background: var(--surface); border-left: 1px solid var(--border); padding: 1rem; overflow-y: auto; flex-shrink: 0; }
.sidebar-title { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 0.75rem; }
.service-list { display: flex; flex-direction: column; gap: 0.4rem; }
.service-item { display: flex; align-items: center; gap: 0.5rem; padding: 0.5rem 0.6rem; border-radius: 8px; border: 1px solid var(--border); font-size: 0.78rem; cursor: pointer; transition: border-color 0.2s; background: none; color: var(--text); font-family: 'Sora', sans-serif; width: 100%; text-align: left; }
.service-item:hover { border-color: var(--accent); }
.service-item:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
.service-item .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--accent2); flex-shrink: 0; }
.section-gap { margin-top: 1.25rem; }

/* WELCOME */
.welcome { text-align: center; padding: 2rem 1rem; color: var(--muted); }
.welcome-icon { font-size: 2.5rem; margin-bottom: 0.75rem; }
.welcome h2 { font-size: 1rem; color: var(--text); margin-bottom: 0.5rem; font-weight: 600; }
.welcome p { font-size: 0.8rem; line-height: 1.6; }

/* HISTORY LOADER */
.history-note { text-align: center; font-size: 0.7rem; color: var(--muted); padding: 0.25rem 0; }

.sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }

/* RESPONSIVE */
@media (max-width: 768px) {
  .sidebar { display: none; }
  .header { padding: 0.6rem 1rem; }
  .quick-actions { padding: 0.6rem 1rem; }
  .messages { padding: 1rem; }
  .msg { max-width: 92%; }
  .user-name { display: none; }
  .input-area { padding: 0.75rem 1rem; }
}
</style>
</head>
<body>

<header class="header">
  <div class="logo">⬡ OmniBot</div>
  <div class="user-info">
    <div class="avatar" id="avatarInitial" aria-hidden="true">U</div>
    <span class="user-name" id="userName">User</span>
    <button class="hdr-btn" id="newChatBtn" type="button">New chat</button>
    <button class="hdr-btn" id="logoutBtn" type="button">Sign out</button>
  </div>
</header>

<nav class="quick-actions" aria-label="Quick actions">
  <button class="qa-btn" data-msg="Order food near me">🍕 Order Food</button>
  <button class="qa-btn" data-msg="Book a cab for me">🚗 Book Cab</button>
  <button class="qa-btn" data-msg="Book a bike ride">🏍️ Bike Ride</button>
  <button class="qa-btn" data-msg="Buy something on Amazon">📦 Shop Now</button>
  <button class="qa-btn" data-msg="Compare prices for me">⚖️ Compare</button>
  <button class="qa-btn" data-msg="Track my order">📍 Track Order</button>
  <button class="qa-btn" data-msg="Help">❓ Help</button>
</nav>

<div class="main">
  <main class="chat-panel">
    <div class="messages" id="messages" role="log" aria-live="polite" aria-label="Chat messages">
      <div class="welcome" id="welcome">
        <div class="welcome-icon" aria-hidden="true">🤖</div>
        <h2>Welcome to OmniBot!</h2>
        <p>Your one-stop assistant for food, rides &amp; shopping.<br>Try the quick buttons above or type anything below.</p>
      </div>
    </div>

    <div class="typing" id="typing" aria-hidden="true">
      <div class="typing-avatar">⬡</div>
      <div class="typing-dots"><span></span><span></span><span></span></div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <label class="sr-only" for="msgInput">Message OmniBot</label>
        <textarea id="msgInput" placeholder="Ask OmniBot anything — food, rides, shopping..." rows="1" maxlength="1000"></textarea>
        <span class="char-hint" id="charHint">0 / 1000</span>
      </div>
      <button class="send-btn" id="sendBtn" type="button" aria-label="Send message">➤</button>
    </div>
  </main>

  <aside class="sidebar" aria-label="Services">
    <div class="sidebar-title">🍕 Food</div>
    <div class="service-list">
      <button class="service-item" data-msg="Order from Zomato"><span class="dot"></span>Zomato</button>
      <button class="service-item" data-msg="Order from Swiggy"><span class="dot"></span>Swiggy</button>
      <button class="service-item" data-msg="Order from Blinkit"><span class="dot"></span>Blinkit</button>
      <button class="service-item" data-msg="Order from Zepto"><span class="dot"></span>Zepto</button>
    </div>
    <div class="section-gap">
      <div class="sidebar-title">🚗 Transport</div>
      <div class="service-list">
        <button class="service-item" data-msg="Book Uber cab"><span class="dot" style="background:#fff"></span>Uber</button>
        <button class="service-item" data-msg="Book Ola cab"><span class="dot" style="background:#ffd700"></span>Ola</button>
        <button class="service-item" data-msg="Book Rapido bike"><span class="dot" style="background:#ff6b00"></span>Rapido</button>
        <button class="service-item" data-msg="Book Yulu cycle"><span class="dot" style="background:#00d4aa"></span>Yulu</button>
      </div>
    </div>
    <div class="section-gap">
      <div class="sidebar-title">📦 Shopping</div>
      <div class="service-list">
        <button class="service-item" data-msg="Buy on Amazon"><span class="dot" style="background:#ff9900"></span>Amazon</button>
        <button class="service-item" data-msg="Buy on Flipkart"><span class="dot" style="background:#2874f0"></span>Flipkart</button>
        <button class="service-item" data-msg="Buy on Meesho"><span class="dot" style="background:#f43397"></span>Meesho</button>
        <button class="service-item" data-msg="Buy on Myntra"><span class="dot" style="background:#ff3f6c"></span>Myntra</button>
      </div>
    </div>
  </aside>
</div>

<script>
'use strict';

// Relative paths — served by the same Spring Boot app, works on any host.
const API = '/api';
const TOKEN_KEY = 'omnibot_token';
const SESSION_KEY = 'omnibot_session';

let token = localStorage.getItem(TOKEN_KEY);
let sessionId = localStorage.getItem(SESSION_KEY) || null;
let lastFailedMessage = null;

// ---------- Auth guard (with expiry check) ----------
function parseJwt(t) {
  try { return JSON.parse(atob(t.split('.')[1].replace(/-/g, '+').replace(/_/g, '/'))); }
  catch (e) { return null; }
}

function isTokenValid(t) {
  const p = t && parseJwt(t);
  if (!p) return false;
  // exp is in seconds; allow 10s clock skew
  return !p.exp || (p.exp * 1000) > (Date.now() + 10000);
}

function logout() {
  localStorage.removeItem(TOKEN_KEY);
  localStorage.removeItem(SESSION_KEY);
  window.location.href = '/login.html';
}

if (!isTokenValid(token)) { logout(); }

const payload = parseJwt(token) || {};
const userEmail = payload.sub || 'User';
const initial = userEmail.charAt(0).toUpperCase();
document.getElementById('avatarInitial').textContent = initial;
document.getElementById('userName').textContent = userEmail.split('@')[0];

// ---------- DOM refs ----------
const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('msgInput');
const sendBtn = document.getElementById('sendBtn');
const typingEl = document.getElementById('typing');
const charHint = document.getElementById('charHint');

// ---------- Helpers ----------
function escapeHtml(s) {
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

// Escape first, THEN apply safe formatting (bold + line breaks).
function formatContent(s) {
  return escapeHtml(s)
    .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
    .replace(/\n/g, '<br>');
}

function formatTime(d) {
  const date = d ? new Date(d) : new Date();
  return isNaN(date.getTime())
    ? ''
    : date.toLocaleTimeString('en-IN', { hour: '2-digit', minute: '2-digit' });
}

function formatIntent(intent) {
  if (!intent || intent === 'UNKNOWN' || intent === 'GREETING') return null;
  return intent.replace(/_/g, ' ');
}

function removeWelcome() {
  const w = document.getElementById('welcome');
  if (w) w.remove();
}

function scrollToBottom() {
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

function setTyping(on) {
  typingEl.classList.toggle('show', on);
  if (on) scrollToBottom();
}

function setBusy(busy) {
  sendBtn.disabled = busy;
  document.querySelectorAll('.qa-btn').forEach(b => { b.disabled = busy; });
}

// ---------- Rendering ----------
function appendMessage(role, content, time, services, opts) {
  opts = opts || {};
  removeWelcome();

  const wrap = document.createElement('div');
  wrap.className = 'msg ' + role + (opts.isError ? ' error' : '');

  const av = document.createElement('div');
  av.className = 'msg-avatar';
  av.setAttribute('aria-hidden', 'true');
  av.textContent = role === 'bot' ? '⬡' : initial;

  const right = document.createElement('div');

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  bubble.innerHTML = formatContent(content);
  right.appendChild(bubble);

  if (services && services.length > 0) {
    right.appendChild(buildCardsRow(services));
  }

  const meta = document.createElement('div');
  meta.className = 'msg-meta';

  const intentLabel = formatIntent(opts.intent);
  if (role === 'bot' && intentLabel) {
    const chip = document.createElement('span');
    chip.className = 'intent-chip';
    chip.textContent = intentLabel;
    meta.appendChild(chip);
  }

  const timeEl = document.createElement('span');
  timeEl.className = 'msg-time';
  timeEl.textContent = formatTime(time);
  meta.appendChild(timeEl);

  if (opts.retryMessage) {
    const retry = document.createElement('button');
    retry.className = 'retry-link';
    retry.type = 'button';
    retry.textContent = 'Retry';
    retry.addEventListener('click', () => {
      wrap.remove();
      sendMessage(opts.retryMessage, { skipUserBubble: true });
    });
    meta.appendChild(retry);
  }

  right.appendChild(meta);
  wrap.appendChild(av);
  wrap.appendChild(right);
  messagesEl.appendChild(wrap);
  scrollToBottom();
}

function buildCardsRow(services) {
  const row = document.createElement('div');
  row.className = 'cards-row';
  services.forEach(s => {
    const card = document.createElement('div');
    card.className = 'svc-card';

    const name = document.createElement('div');
    name.className = 'svc-name';
    name.textContent = (s.logo ? s.logo + ' ' : '') + (s.name || '');

    const eta = document.createElement('div');
    eta.className = 'svc-eta';
    eta.textContent = s.estimate || '';

    const price = document.createElement('div');
    price.className = 'svc-price';
    price.textContent = s.price || '';

    const rating = document.createElement('div');
    rating.className = 'svc-rating';
    rating.textContent = s.rating ? '⭐ ' + s.rating : '';

    const btn = document.createElement('button');
    btn.className = 'svc-btn';
    btn.type = 'button';
    btn.textContent = 'Select ' + (s.name || 'service');
    btn.addEventListener('click', () => {
      const action = (s.action || '').replace(/_/g, ' ').toLowerCase();
      sendMessage('I want to use ' + s.name + (action ? ' for ' + action : ''));
    });

    card.appendChild(name);
    card.appendChild(eta);
    card.appendChild(price);
    card.appendChild(rating);
    card.appendChild(btn);
    row.appendChild(card);
  });
  return row;
}

// ---------- History restore ----------
async function loadHistory() {
  if (!sessionId) return;
  try {
    const res = await fetch(API + '/chat/history?sessionId=' + encodeURIComponent(sessionId), {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.status === 401) { logout(); return; }
    if (!res.ok) return;

    const items = await res.json();
    if (!Array.isArray(items) || items.length === 0) return;

    removeWelcome();
    const note = document.createElement('div');
    note.className = 'history-note';
    note.textContent = 'Previous conversation restored';
    messagesEl.appendChild(note);

    items.forEach(item => {
      const role = item.role === 'user' ? 'user' : 'bot';
      appendMessage(role, item.content || '', item.timestamp, null, { intent: item.intent });
    });
  } catch (err) {
    // History is best-effort; a fresh chat still works.
  }
}

// ---------- Sending ----------
async function sendMessage(text, opts) {
  opts = opts || {};
  const msg = (text != null ? text : inputEl.value).trim();
  if (!msg || sendBtn.disabled) return;

  if (text == null) {
    inputEl.value = '';
    inputEl.style.height = 'auto';
    updateCharHint();
  }

  setBusy(true);
  if (!opts.skipUserBubble) appendMessage('user', msg, new Date(), null);
  setTyping(true);

  try {
    const res = await fetch(API + '/chat', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': 'Bearer ' + token
      },
      body: JSON.stringify({ message: msg, sessionId: sessionId })
    });

    if (res.status === 401) { logout(); return; }

    if (!res.ok) {
      let detail = 'Something went wrong (HTTP ' + res.status + ').';
      try {
        const errBody = await res.json();
        if (errBody && errBody.message) detail = errBody.message;
      } catch (e) { /* non-JSON error body */ }
      throw new Error(detail);
    }

    const data = await res.json();
    if (data.sessionId) {
      sessionId = data.sessionId;
      localStorage.setItem(SESSION_KEY, sessionId);
    }

    setTyping(false);
    appendMessage('bot', data.reply || '', data.timestamp, data.services, { intent: data.intent });
    lastFailedMessage = null;

  } catch (err) {
    setTyping(false);
    lastFailedMessage = msg;
    const isNetwork = err instanceof TypeError;
    const text = isNetwork
      ? 'Unable to reach the OmniBot server. Check that the backend is running, then retry.'
      : (err.message || 'Something went wrong. Please retry.');
    appendMessage('bot', '⚠️ ' + text, new Date(), null, { isError: true, retryMessage: msg });
  } finally {
    setBusy(false);
    inputEl.focus();
  }
}

// ---------- Input handling ----------
function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
}

function updateCharHint() {
  const len = inputEl.value.length;
  charHint.textContent = len + ' / 1000';
  charHint.classList.toggle('show', len > 800);
  charHint.classList.toggle('over', len >= 1000);
}

inputEl.addEventListener('input', () => { autoResize(); updateCharHint(); });

inputEl.addEventListener('keydown', (e) => {
  // Respect CJK IME composition: Enter confirms composition, not submit.
  if (e.isComposing || e.keyCode === 229) return;
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', () => sendMessage());

document.getElementById('logoutBtn').addEventListener('click', logout);

document.getElementById('newChatBtn').addEventListener('click', () => {
  sessionId = null;
  localStorage.removeItem(SESSION_KEY);
  messagesEl.innerHTML =
    '<div class="welcome" id="welcome">' +
      '<div class="welcome-icon" aria-hidden="true">🤖</div>' +
      '<h2>New conversation started</h2>' +
      '<p>Ask OmniBot anything — food, rides &amp; shopping.</p>' +
    '</div>';
  inputEl.focus();
});

// Quick actions + sidebar services share the data-msg pattern
document.querySelectorAll('[data-msg]').forEach(btn => {
  btn.addEventListener('click', () => sendMessage(btn.getAttribute('data-msg')));
});

// ---------- Init ----------
loadHistory();
inputEl.focus();
</script>
</body>
</html>
